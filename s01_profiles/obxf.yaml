cmaes_extra_params:
  # Surrogate params with CMA-ES bounds — prevents extremes that corrupt pitch or
  # create aliasing artefacts. All these params are also in the surrogate `parameters`
  # above; listing them here only constrains the CMA-ES search range.
  Cross Modulation:
    importance: 0.60
    bounds: [0.0, 0.15]
  Amp Env Attack:
    importance: 0.80
    bounds: [0.0, 0.30]
  Ring Mod Volume:
    importance: 0.65
    bounds: [0.0, 0.25]
  Osc 2 Pitch:
    importance: 0.75
    bounds: [0.40, 0.60]
  Osc 2 Volume:
    importance: 0.80
    bounds: [0.0, 0.50]
  Filter Env Release:
    importance: 0.60
    bounds: [0.2, 1.0]

