  LFO 1 to Osc 1 Pitch: 0.0
  Noise Color: 0.0
  Noise Volume: 0.0
  Osc 1 Pitch: 0.5
  Osc 1 Pulse Wave: 0.0
  Osc 1 Saw Wave: 1.0
